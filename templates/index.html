<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chat</title>
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <h1>RAG Assistant</h1>
            <p>Ask anything based on the knowledge base</p>
        </div>
        <div class="chat-box" id="chat-box">
            <!-- Messages will appear here -->
            <div class="message system">
                <div class="message-content">Hello! Please attach the reference first.</div>
            </div>
        </div>
        <div class="input-container">
            <input type="file" id="file-upload" accept=".txt" style="display: none;" />
            <button id="upload-btn" title="Upload TXT file">📎</button>
            <input type="text" id="query-input" placeholder="Type your message here..." autocomplete="off" />
            <button id="send-btn">Send</button>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
